name: Build and Release Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag (for example, v1.1.0)
        required: true
        type: string

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: Build release packages
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read # Required to check out the tagged source.
    outputs:
      release_tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 1
          fetch-tags: true
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - name: Set up Corepack
        run: |
          test "$(corepack --version)" = "0.35.0"
          corepack enable
          test "$(yarn --version)" = "4.17.1"

      - name: Validate release tag
        id: release
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must use the vX.Y.Z format: $RELEASE_TAG"
            exit 1
          fi

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_VERSION="${PACKAGE_VERSION%%-*}"
          EXPECTED_TAG="v${RELEASE_VERSION}"

          if [[ "$RELEASE_TAG" != "$EXPECTED_TAG" ]]; then
            echo "::error::Release tag $RELEASE_TAG does not match package version $PACKAGE_VERSION (expected $EXPECTED_TAG)"
            exit 1
          fi

          if ! git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}" >/dev/null; then
            echo "::error::Release tag does not exist: $RELEASE_TAG"
            exit 1
          fi

          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type-check sources
        run: yarn typecheck

      - name: Build Firefox package
        run: yarn zip:firefox

      - name: Build Chrome package
        run: yarn zip

      - name: Verify release packages
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          test -f build/firefox-mv2-prod.zip
          test -f build/chrome-mv3-prod.zip

          unzip -p build/firefox-mv2-prod.zip manifest.json | cmp - build/firefox-mv2/manifest.json
          unzip -p build/chrome-mv3-prod.zip manifest.json | cmp - build/chrome-mv3/manifest.json

          node <<'NODE'
          const fs = require("node:fs")

          const chrome = JSON.parse(
            fs.readFileSync("build/chrome-mv3/manifest.json", "utf8")
          )
          const firefox = JSON.parse(
            fs.readFileSync("build/firefox-mv2/manifest.json", "utf8")
          )
          const expectedVersion = process.env.RELEASE_VERSION
          const expectedHostPermission = "https://skeb.jp/api/*"

          function assert(condition, message) {
            if (!condition) throw new Error(message)
          }

          assert(chrome.manifest_version === 3, "Chrome manifest must use MV3")
          assert(
            chrome.version === expectedVersion,
            `Chrome manifest version must be ${expectedVersion}`
          )
          assert(
            !chrome.permissions || chrome.permissions.length === 0,
            "Chrome manifest contains unexpected API permissions"
          )
          assert(
            chrome.host_permissions?.length === 1 &&
              chrome.host_permissions[0] === expectedHostPermission,
            "Chrome host permissions changed unexpectedly"
          )

          assert(firefox.manifest_version === 2, "Firefox manifest must use MV2")
          assert(
            firefox.version === expectedVersion,
            `Firefox manifest version must be ${expectedVersion}`
          )
          assert(
            firefox.permissions?.length === 1 &&
              firefox.permissions[0] === expectedHostPermission,
            "Firefox permissions changed unexpectedly"
          )
          assert(
            firefox.browser_specific_settings?.gecko?.id ===
              "skebify@idnf.dev",
            "Firefox extension ID changed unexpectedly"
          )
          assert(
            firefox.browser_specific_settings?.gecko?.strict_min_version ===
              "140.0",
            "Firefox minimum version changed unexpectedly"
          )
          assert(
            firefox.browser_specific_settings?.gecko
              ?.data_collection_permissions?.required?.length === 2 &&
              firefox.browser_specific_settings.gecko.data_collection_permissions.required.includes(
                "browsingActivity"
              ) &&
              firefox.browser_specific_settings.gecko.data_collection_permissions.required.includes(
                "websiteContent"
              ),
            "Firefox data collection permissions changed unexpectedly"
          )
          NODE

          (
            cd build
            sha256sum chrome-mv3-prod.zip firefox-mv2-prod.zip > SHA256SUMS
          )

      - name: Upload release packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: skebify-extension-packages
          path: |
            build/chrome-mv3-prod.zip
            build/firefox-mv2-prod.zip
            build/SHA256SUMS
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  release:
    name: Create draft GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write # Required only to create the draft GitHub Release.

    steps:
      - name: Download release packages
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: skebify-extension-packages
          path: release-assets

      - name: Verify downloaded packages
        working-directory: release-assets
        run: sha256sum --check SHA256SUMS

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
        run: |
          set -euo pipefail

          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --draft \
            --generate-notes \
            --title "$RELEASE_TAG" \
            release-assets/chrome-mv3-prod.zip \
            release-assets/firefox-mv2-prod.zip \
            release-assets/SHA256SUMS
